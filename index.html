<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>❤️ someone sent you this❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ==========================
     LOVE SCREEN
=========================== -->

<div id="loveScreen">

    <div id="heartBackground"></div>

    <div id="envelope">

        <div id="envelopeTop"></div>

        <div id="letter">

            <h1>❤️</h1>

            <h2>someone sent you this</h2>

            <p>tap to open</p>

        </div>

    </div>

</div>

<!-- ==========================
     MATRIX
=========================== -->

<canvas id="matrixCanvas"></canvas>

<!-- ==========================
     HACK SCREEN
=========================== -->

<div id="hackScreen">

    <!-- Hacker Background Effects -->
    <div id="grid"></div>

    <div id="glow"></div>

    <!-- Alarm Flash -->
    <div id="alarm"></div>

    <!-- Title -->
    <h1 id="glitchText">

        YOU'VE BEEN HACKED

    </h1>

    <!-- Target Image -->

    <div id="targetBox">

       <img id="targetImage" src="images/target.jpg" alt="Target">
        <div id="scanLine"></div>

    </div>

    <!-- Terminal -->

    <div id="terminal">

        <div id="terminalHeader">

            SYSTEM TERMINAL

        </div>

        <div id="logs">

        </div>

    </div>

    <!-- Popup Container -->

    <div id="popupContainer">

    </div>

</div>

<!-- ==========================
     AUDIO
=========================== -->

<audio id="bgMusic" loop>

    <source src="sounds/horror.mp3"
            type="audio/mpeg">

</audio>

<audio id="errorSound">

    <source src="sounds/error.mp3"
            type="audio/mpeg">

</audio>

<audio id="alarmSound">

    <source src="sounds/alarm.mp3"
            type="audio/mpeg">

</audio>

<!-- ==========================
     JAVASCRIPT
=========================== -->

<script src="script.js"></script>

</body>
</html>
